<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lançador de Dados D10 • Mago: O Despertar</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400;500;600&display=swap');

        body {
            margin: 0;
            padding: 0;
            font-family: 'Inter', system-ui, sans-serif;
            background: linear-gradient(135deg, #1a1429 0%, #2c2540 100%);
            color: #e8dff5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        header {
            width: 100%;
            background: rgba(0, 0, 0, 0.35);
            padding: 25px 0;
            text-align: center;
            border-bottom: 1px solid rgba(200, 162, 255, 0.2);
        }

        h1 {
            margin: 0;
            font-family: 'Playfair Display', Georgia, serif;
            font-size: 2.6em;
            color: #c8a2ff;
            text-shadow: 0 0 20px rgba(200, 162, 255, 0.4);
        }

        main {
            width: 100%;
            max-width: 920px;
            padding: 40px 20px;
            box-sizing: border-box;
        }

        .controls {
            background: rgba(255, 255, 255, 0.06);
            border: 1px solid rgba(200, 162, 255, 0.15);
            border-radius: 16px;
            padding: 30px;
            margin-bottom: 35px;
            text-align: center;
        }

        label {
            display: block;
            font-size: 1.15em;
            margin-bottom: 12px;
            color: #d4c4ff;
            font-weight: 500;
        }

        select {
            font-size: 1.15em;
            padding: 12px 24px;
            border-radius: 10px;
            border: 2px solid #6b4e9e;
            background: #2c2540;
            color: #e8dff5;
            margin-right: 15px;
            min-width: 160px;
        }

        button {
            background: linear-gradient(145deg, #6b4e9e, #4a2f7a);
            color: white;
            border: none;
            padding: 14px 42px;
            font-size: 1.25em;
            font-weight: 600;
            border-radius: 10px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 6px 18px rgba(107, 78, 158, 0.5);
        }

        button:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(107, 78, 158, 0.6);
        }

        #results {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(200, 162, 255, 0.12);
            border-radius: 16px;
            padding: 30px;
            min-height: 280px;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 25px;
            font-size: 1.6em;
            color: #c8a2ff;
            text-align: center;
        }

        #diceContainer {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 22px;
        }

        .die-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.25);
            padding: 14px 18px 18px;
            border-radius: 14px;
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            box-shadow: 0 6px 15px rgba(0, 0, 0, 0.4);
        }

        img.die {
            width: 92px;
            height: 92px;
            border: 3px solid #8a6fc9;
            border-radius: 12px;
            box-shadow: 0 10px 20px rgba(0, 0, 0, 0.5);
            background: #1f1a33;
        }

        .roll-value {
            margin-top: 12px;
            font-size: 1.55em;
            font-weight: 700;
            color: #f0e6ff;
            text-shadow: 0 2px 4px rgba(0, 0, 0, 0.6);
            background: rgba(107, 78, 158, 0.3);
            padding: 2px 14px;
            border-radius: 20px;
            min-width: 42px;
            text-align: center;
        }

        /* === DESTAQUES === */
        .highlight-low {
            border: 3px solid #5c3a3a !important;
            box-shadow: 0 6px 15px rgba(80, 30, 30, 0.6);
            background: rgba(60, 25, 25, 0.3);
        }

        .highlight-medium {
            border: 3px solid #d4af37 !important;
            box-shadow: 0 8px 20px rgba(212, 175, 55, 0.5);
            background: rgba(80, 60, 20, 0.25);
        }

        .highlight-high {
            border: 3px solid #ffd700 !important;
            box-shadow: 0 0 25px #ffd700,
                        0 0 45px #c8a2ff,
                        0 10px 25px rgba(0, 0, 0, 0.5);
            background: rgba(60, 45, 10, 0.3);
            transform: scale(1.08);
        }

        #placeholder {
            text-align: center;
            color: #a090c0;
            font-style: italic;
            font-size: 1.1em;
            margin: 60px 0;
        }

        footer {
            margin-top: auto;
            padding: 25px;
            font-size: 0.9em;
            color: #7a6a9c;
            text-align: center;
        }
    </style>
</head>
<body>
    <header>
        <h1>Mago: O Despertar</h1>
        <p style="margin: 8px 0 0; color: #a090c0;">Lançador de Dados D10</p>
    </header>

    <main>
        <div class="controls">
            <label for="numDice">Quantos dados deseja lançar?</label>
            <select id="numDice">
                <option value="1">1 dado</option>
                <option value="2">2 dados</option>
                <option value="3">3 dados</option>
                <option value="4">4 dados</option>
                <option value="5">5 dados</option>
                <option value="6">6 dados</option>
                <option value="7">7 dados</option>
                <option value="8">8 dados</option>
                <option value="9">9 dados</option>
                <option value="10" selected>10 dados</option>
            </select>
            <button onclick="rollDice()">Lançar Dados</button>
        </div>

        <div id="results">
            <h2>Resultados do Lançamento</h2>
            <p id="placeholder">Selecione o número de dados e clique em “Lançar Dados”.</p>
            <div id="diceContainer"></div>
        </div>
    </main>

    <footer>
        Imagens dos dados • Repositório Mago o Despertar
    </footer>

    <script>
        // Ordem CORRETA das imagens (D10)
        const diceImages = [
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0001_Camada-2.png',   // 1
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0002_Camada-3.png',   // 2
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0003_Camada-4.png',   // 3
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0004_Camada-5.png',   // 4
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0005_Camada-6.png',   // 5
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0006_Camada-7.png',   // 6
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0007_Camada-8.png',   // 7
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0008_Camada-9.png',   // 8
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0009_Camada-10.png',  // 9
            'https://raw.githubusercontent.com/knunisonhos-create/mago-o-despertar/main/dados/D10_0000_Camada-1.png'    // 10
        ];

        // Função de som (Web Audio API)
        function playRollSound() {
            try {
                const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                
                // Ruído de rolamento (rattle)
                const noise = audioCtx.createBufferSource();
                const buffer = audioCtx.createBuffer(1, audioCtx.sampleRate * 0.6, audioCtx.sampleRate);
                const data = buffer.getChannelData(0);
                for (let i = 0; i < data.length; i++) {
                    data[i] = Math.random() * 2 - 1;
                }
                noise.buffer = buffer;

                const noiseFilter = audioCtx.createBiquadFilter();
                noiseFilter.type = 'bandpass';
                noiseFilter.frequency.value = 800;
                noiseFilter.Q.value = 0.5;

                const noiseGain = audioCtx.createGain();
                noiseGain.gain.value = 0.05;

                // Envelope do ruído
                const noiseEnv = audioCtx.createGain();
                noiseEnv.gain.value = 0.8;

                noise.connect(noiseFilter);
                noiseFilter.connect(noiseGain);
                noiseGain.connect(noiseEnv);
                noiseEnv.connect(audioCtx.destination);

                noise.start();
                noiseEnv.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.55);

                // Clacks finais (sons de parada)
                setTimeout(() => {
                    for (let i = 0; i < 2; i++) {
                        setTimeout(() => {
                            const osc = audioCtx.createOscillator();
                            osc.type = 'sawtooth';
                            osc.frequency.value = 180 + (i * 40);

                            const gain = audioCtx.createGain();
                            gain.gain.value = 0.05;

                            const filter = audioCtx.createBiquadFilter();
                            filter.type = 'lowpass';
                            filter.frequency.value = 600;

                            osc.connect(filter);
                            filter.connect(gain);
                            gain.connect(audioCtx.destination);

                            osc.start();
                            gain.gain.linearRampToValueAtTime(0, audioCtx.currentTime + 0.18);
                            setTimeout(() => osc.stop(), 200);
                        }, i * 90);
                    }
                }, 420);
            } catch (e) {
                console.log('Áudio não suportado neste navegador.');
            }
        }

        function rollDice() {
            const numDice = parseInt(document.getElementById('numDice').value);
            const container = document.getElementById('diceContainer');
            const placeholder = document.getElementById('placeholder');

            container.innerHTML = '';
            placeholder.style.display = 'none';

            // Toca o som de lançamento
            playRollSound();

            for (let i = 0; i < numDice; i++) {
                const finalRoll = Math.floor(Math.random() * 10) + 1;

                const wrapper = document.createElement('div');
                wrapper.className = 'die-wrapper';

                const img = document.createElement('img');
                img.className = 'die';
                img.alt = `Dado D10 mostrando ${finalRoll}`;

                // Inicia com imagem aleatória
                const startIndex = Math.floor(Math.random() * 10);
                img.src = diceImages[startIndex];

                wrapper.appendChild(img);
                container.appendChild(wrapper);

                // Animação de rolamento
                let animationCount = 0;
                const animInterval = setInterval(() => {
                    animationCount++;
                    const tempIndex = Math.floor(Math.random() * 10);
                    img.src = diceImages[tempIndex];

                    if (animationCount >= 13) {
                        clearInterval(animInterval);
                        img.src = diceImages[finalRoll - 1];

                        // Mostra o número
                        const valueSpan = document.createElement('span');
                        valueSpan.className = 'roll-value';
                        valueSpan.textContent = finalRoll;
                        wrapper.appendChild(valueSpan);

                        // === APLICA DESTAQUE ===
                        if (finalRoll === 1) {
                            wrapper.classList.add('highlight-low');
                        } else if (finalRoll === 10) {
                            wrapper.classList.add('highlight-high');
                        } else if (finalRoll === 8 || finalRoll === 9) {
                            wrapper.classList.add('highlight-medium');
                        }

                        // Efeito final
                        wrapper.style.transform = 'scale(1.08)';
                        setTimeout(() => {
                            wrapper.style.transform = 'scale(1)';
                        }, 200);
                    }
                }, 70);
            }
        }
    </script>
</body>
</html>
